    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary)',
                        background: 'var(--color-background)',
                        surface: 'var(--color-surface)',
                        border: 'var(--color-border)',
                        success: 'var(--color-success)',
                        danger: 'var(--color-danger)',
                        warning: 'var(--color-warning)',
                        secondary: 'var(--color-secondary)',
                        brand: 'var(--color-brand)'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --color-primary: #18181b;
            /* Zinc 900 */
            --color-secondary: #71717a;
            /* Zinc 500 */
            --color-background: #fafafa;
            /* Zinc 50 */
            --color-surface: #ffffff;
            --color-border: #e4e4e7;
            /* Zinc 200 */
            --color-success: #10b981;
            --color-danger: #ef4444;
            --color-warning: #f59e0b;
            --color-brand: #3b82f6;
            /* Premium Blue */
        }

        .dark {
            --color-primary: #f4f4f5;
            /* Zinc 100 */
            --color-secondary: #a1a1aa;
            /* Zinc 400 */
            --color-background: #09090b;
            /* Zinc 950 */
            --color-surface: #18181b;
            /* Zinc 900 */
            --color-border: #27272a;
            /* Zinc 800 */
            --color-success: #34d399;
            --color-danger: #f87171;
            --color-warning: #fbbf24;
            --color-brand: #60a5fa;
        }

        /* Scrollbar minimalis kustom */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 9999px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
        }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">

                            </svg>
                        </button>
                    </div>
                </div>

                <div
                    class="flex-1 overflow-y-auto custom-scrollbar p-6 lg:p-12 pb-24 md:pb-12 bg-white dark:bg-[#0c0c0e]">
                    <div class="max-w-3xl mx-auto h-full flex flex-col">
                        <!-- Input Judul Otomatis Melar -->
                        <textarea id="editor-title"
                            class="w-full bg-transparent border-none focus:outline-none text-2xl md:text-3xl font-bold text-primary placeholder-zinc-300 dark:placeholder-zinc-700 resize-none mb-4 leading-tight"
                            rows="1" placeholder="Judul Catatan..."
                            oninput="autoExpandTextarea(this); handleNoteInput()"></textarea>

                        <!-- Metadata Tanggal -->
                        <div class="flex items-center space-x-2 text-xs text-zinc-400 mb-6 font-medium">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                                </path>
                            </svg>
                            <span id="editor-date">Hari ini, 12:00</span>
                        </div>

                        <!-- Input Isi Utama -->
                        <textarea id="editor-content"
                            class="w-full bg-transparent border-none focus:outline-none text-sm md:text-base text-zinc-700 dark:text-zinc-300 placeholder-zinc-400 resize-none flex-1 leading-loose"

        <nav class="md:hidden absolute bottom-0 left-0 right-0 bg-surface border-t border-border flex justify-around items-center h-16 z-40 px-2 pb-safe shadow-[0_-1px_10px_rgba(0,0,0,0.02)] dark:bg-surface dark:border-[#27272a]"> <a href="index.html" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-primary transition-colors"> <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> <span class="text-[10px] font-medium">Beranda</span> </a> <a href="tasks.html" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-primary transition-colors"> <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> <span class="text-[10px] font-medium">Tugas</span> </a> <a href="calendar.html" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-primary transition-colors"> <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> <span class="text-[10px] font-medium">Kalender</span> </a> <a href="notes.html" class="flex flex-col items-center justify-center w-full h-full text-primary transition-colors"> <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg> <span class="text-[10px] font-medium">Catatan</span> </a> <a href="finance.html" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-primary transition-colors"> <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> <span class="text-[10px] font-medium">Keuangan</span> </a> </nav>
    </main>

    <div id="toast-container" class="fixed bottom-20 md:bottom-20 right-4 z-50 space-y-2 pointer-events-none"></div>

    <script>

        // Fungsi Modal Konfirmasi Kustom
        function showConfirmModal(message, onConfirm) {
            let container = document.getElementById('notes-confirm-modal');
            if (!container) {
                container = document.createElement('div');
                container.id = 'notes-confirm-modal';
                container.className = 'fixed inset-0 z-[99999] flex items-center justify-center hidden';
                container.innerHTML = `
                    <div class="absolute inset-0 bg-zinc-900/40 backdrop-blur-sm transition-opacity opacity-0" id="notes-confirm-backdrop"></div>
                    <div class="relative bg-surface rounded-xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden border border-border flex flex-col transform scale-95 opacity-0 transition-all duration-200 dark:bg-surface dark:border-[#27272a]" id="notes-confirm-content">
                        <div class="px-5 py-4 border-b border-border bg-zinc-50/50 dark:border-[#27272a] dark:bg-[#09090b]/50">
                            <h3 class="text-sm font-semibold text-primary">Konfirmasi</h3>
                        </div>
                        <div class="p-5">
                            <p class="text-sm text-zinc-600 dark:text-zinc-400" id="notes-confirm-msg"></p>
                        </div>
                        <div class="px-5 py-4 bg-zinc-50 flex justify-end gap-2 border-t border-border dark:bg-[#09090b] dark:border-[#27272a]">
                            <button id="notes-confirm-no" class="px-4 py-2 text-xs font-medium text-zinc-600 hover:text-primary bg-white border border-zinc-300 rounded-lg hover:bg-zinc-50 transition-colors dark:text-zinc-400 dark:bg-surface dark:border-[#3f3f46] dark:hover:bg-[#27272a]">Tidak</button>
                            <button id="notes-confirm-yes" class="px-4 py-2 text-xs font-medium text-white bg-danger rounded-lg hover:bg-red-700 transition-colors">Iyyah</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(container);
            }
            
            document.getElementById('notes-confirm-msg').innerText = message;
            const modal = container;
            const backdrop = document.getElementById('notes-confirm-backdrop');
            const content = document.getElementById('notes-confirm-content');
            
            modal.classList.remove('hidden');
            // trigger reflow
            void modal.offsetWidth;
            
            backdrop.classList.remove('opacity-0');
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
            
            const cleanup = () => {
                backdrop.classList.add('opacity-0');
                content.classList.remove('scale-100', 'opacity-100');
                content.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 200);
            };
            
            document.getElementById('notes-confirm-yes').onclick = () => {
                cleanup();
                if (onConfirm) onConfirm();
            };
            document.getElementById('notes-confirm-no').onclick = cleanup;
            backdrop.onclick = cleanup;
        }

        // State Aplikasi Utama
        let notes = [];
        let selectedNoteId = null;
        let activeCategory = 'Semua';
        let searchQuery = '';

        // Mock Catatan Bawaan Pertama Kali
        const defaultNotes = [
            {
                id: "note-1",
                title: "Ide Produk SaaS 2026",
                content: "Beberapa ide untuk aplikasi B2B yang fokus pada produktivitas tim kecil tanpa framework yang berat. Menggunakan pendekatan micro-SAAS berbasis utilitas tinggi.",
                category: "Ide",
                date: "14 Jul 2026"
            },
            {
                id: "note-2",
                title: "Meeting Notes: Desain Sistem",
                content: "Beberapa keputusan penting pasca diskusi dengan tim:\n- Hapus badge merah yang mengganggu pada dropdown.\n- Jangan tampilkan hitungan (2/4) di subtask agar layout lebih bersih.\n- Buat transisi panel board selembut mungkin.",
                category: "Kerja",
                date: "Hari ini"
            },
            {
                id: "note-3",
                title: "Jurnal Harian",
                content: "Hari yang sangat produktif. Berhasil merapikan kode aplikasi Catatan dengan single-file format yang bersih dan terstruktur rapi menggunakan standard Tailwind.",
                category: "Jurnal",
                date: "Kemarin"
            },
            {
                id: "note-4",
                title: "Buku Resep Sehat",
                content: "1. Oatmeal pisang di pagi hari.\n2. Salad ayam panggang rendah lemak di siang hari.\n3. Batasi asupan gula maksimal 25 gram per hari.",
                category: "Personal",
                date: "10 Jul 2026"
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // Muat catatan dari LocalStorage jika ada, jika tidak pakai default
            const savedNotes = localStorage.getItem('personal_os_notes');
            if (savedNotes) {
                try {
                    notes = JSON.parse(savedNotes);
                } catch (e) {
                    notes = [...defaultNotes];
                }
            } else {
                notes = [...defaultNotes];
                saveNotesToStorage();
            }

            // Render Kategori & List Catatan pertama kali
            renderCategoryPills();
            renderNotesList();

            // Pilih catatan pertama secara default pada layar besar (MD ke atas)
            if (notes.length > 0 && window.innerWidth >= 768) {
                selectNote(notes[0].id);
            }
        });

        // Simpan data ke localStorage
        function saveNotesToStorage() {
            localStorage.setItem('personal_os_notes', JSON.stringify(notes));
        }

        const categories = ['Semua', 'Ide', 'Jurnal', 'Kerja', 'Personal'];

        function renderCategoryPills() {
            const container = document.getElementById('category-pills-container');
            if (!container) return;

            container.innerHTML = categories.map(cat => {
                const isActive = activeCategory === cat;
                const activeClass = isActive
                    ? 'bg-zinc-900 text-white dark:bg-white dark:text-zinc-900'
                    : 'bg-zinc-100 text-zinc-600 hover:bg-zinc-200 dark:bg-zinc-800 dark:text-zinc-400 dark:hover:bg-zinc-700';

                return `
          <span onclick="setFilterCategory('${cat}')" class="px-3 py-1 text-[11px] sm:text-xs font-semibold rounded-full cursor-pointer whitespace-nowrap transition-colors duration-150 ${activeClass}">
            ${cat}
          </span>
        `;
            }).join('');
        }

        function setFilterCategory(cat) {
            activeCategory = cat;
            renderCategoryPills();
            renderNotesList();
        }

        function renderNotesList() {
            const container = document.getElementById('notes-cards-list');
            if (!container) return;

            // Filter berdasarkan pencarian dan kategori
            const filteredNotes = notes.filter(note => {
                const matchesCategory = activeCategory === 'Semua' || note.category === activeCategory;
                const query = searchQuery.toLowerCase();
                const matchesSearch = note.title.toLowerCase().includes(query) || note.content.toLowerCase().includes(query);
                return matchesCategory && matchesSearch;
            });

            if (filteredNotes.length === 0) {
                container.innerHTML = `
          <div class="flex flex-col items-center justify-center py-12 px-4 text-center">
            <svg class="w-8 h-8 text-zinc-300 dark:text-zinc-700 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p class="text-xs font-medium text-zinc-500">Tidak ada catatan ditemukan</p>
          </div>
        `;
                return;
            }

            container.innerHTML = filteredNotes.map(note => {
                const isSelected = note.id === selectedNoteId;

                // Penyesuaian kelas aktif premium (card terseleksi)
                const bgClass = isSelected
                    ? 'bg-zinc-900 text-white border-transparent dark:bg-zinc-800'
                    : 'bg-surface border-border hover:border-zinc-300 dark:hover:border-zinc-700 text-primary';

                const descClass = isSelected
                    ? 'text-zinc-300'
                    : 'text-zinc-500 dark:text-zinc-400';

                const tagBadgeClass = isSelected
                    ? 'bg-zinc-800 text-zinc-200 border-transparent'
                    : 'bg-zinc-100 text-zinc-600 border-zinc-200 dark:bg-zinc-800 dark:text-zinc-400 dark:border-zinc-700';

                return `
          <div onclick="selectNote('${note.id}')" class="p-4 rounded-xl border cursor-pointer transition-all duration-200 hover:shadow-sm ${bgClass}">
            <h3 class="text-xs sm:text-sm font-semibold mb-1 line-clamp-1">${note.title || 'Catatan Tanpa Judul'}</h3>
            <p class="text-[11px] sm:text-xs mb-3 line-clamp-2 leading-relaxed ${descClass}">${note.content || 'Mulai menulis...'}</p>
            <div class="flex items-center justify-between mt-auto">
              <span class="text-[9px] font-medium text-zinc-400">${note.date}</span>
              <span class="inline-flex items-center rounded px-1.5 py-0.5 text-[9px] font-bold border ${tagBadgeClass}">${note.category || 'Ide'}</span>
            </div>
          </div>
        `;
            }).join('');
        }

        function selectNote(noteId) {
            selectedNoteId = noteId;
            const note = notes.find(n => n.id === noteId);
            if (!note) return;

            // Update isi input editor
            const titleInput = document.getElementById('editor-title');
            const contentInput = document.getElementById('editor-content');
            const dateElement = document.getElementById('editor-date');
            const folderNameElement = document.getElementById('editor-folder-name');

            if (titleInput) {
                titleInput.value = note.title;
                autoExpandTextarea(titleInput);
            }
            if (contentInput) {
                contentInput.value = note.content;
            }
            if (dateElement) {
                dateElement.innerText = `Terakhir diubah: ${note.date}`;
            }
            if (folderNameElement) {
                folderNameElement.innerText = note.category || 'Pilih Tag';
            }

            // Tampilkan editor di mobile view
            const editorPanel = document.getElementById('notes-editor-panel');
            if (editorPanel) {
                editorPanel.classList.remove('hidden');
                setTimeout(() => {
                    editorPanel.classList.remove('translate-y-full');
                }, 10);
            }

            // Gambar ulang kartu list untuk memperbarui status 'active'
            renderNotesList();
        }

        function createNewNote() {
            const now = new Date();
            const dateString = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
            const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            const newNote = {
                id: 'note-' + Date.now(),
                title: '',
                content: '',
                category: 'Ide',
                date: `${dateString}, ${timeString}`
            };

            // Tambahkan ke awal antrean catatan
            notes.unshift(newNote);
            saveNotesToStorage();

            // Pilih & buka langsung catatan baru tersebut
            selectNote(newNote.id);

            // Berikan fokus ke input judul langsung
            setTimeout(() => {
                const titleInput = document.getElementById('editor-title');
                if (titleInput) titleInput.focus();
            }, 350);

            showSuccessToast('Catatan baru berhasil dibuat!');
        }

        function handleNoteInput() {
            if (!selectedNoteId) return;

            const note = notes.find(n => n.id === selectedNoteId);
            if (!note) return;

            const titleInput = document.getElementById('editor-title');
            const contentInput = document.getElementById('editor-content');
            const statusElement = document.getElementById('editor-save-status');

            if (statusElement) {
                statusElement.innerText = 'Menyimpan...';
            }

            // Update state data lokal
            note.title = titleInput.value;
            note.content = contentInput.value;

            const now = new Date();
            const dateString = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
            const timeString = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            note.date = `${dateString}, ${timeString}`;

            // Simpan berkala (Debounced / Instan untuk kemudahan)
            saveNotesToStorage();

            // Gambar ulang sidebar kiri tanpa mematikan fokus kursor
            renderNotesList();

            setTimeout(() => {
                if (statusElement) {
                    statusElement.innerText = 'Disimpan';
                }
            }, 600);
        }

        function setNoteCategory(categoryName) {
            if (!selectedNoteId) return;

            const note = notes.find(n => n.id === selectedNoteId);
            if (note) {
                note.category = categoryName;
                document.getElementById('editor-folder-name').innerText = categoryName;
                saveNotesToStorage();
                renderNotesList();
                showSuccessToast(`Kategori diubah menjadi "${categoryName}"`);
            }

            // Sembunyikan dropdown setelah memilih
            toggleCategorySelectDropdown();
        }

        // Menghapus catatan aktif saat ini
        function deleteActiveNote() {
            if (!selectedNoteId) return;

            // Cari index catatan tersebut
            const index = notes.findIndex(n => n.id === selectedNoteId);
            if (index === -1) return;

            // Konfirmasi kustom/dialog halus dibanding menggunakan window.confirm
            if (true) {
                showConfirmModal('Apakah Anda yakin ingin menghapus catatan ini?', () => {
                    notes.splice(index, 1);
                    saveNotesToStorage();
                    showSuccessToast('Catatan berhasil dihapus!');

                    // Bersihkan state & tutup editor di ponsel
                    selectedNoteId = null;
                    closeNoteEditor();
                    renderNotesList();

                    // Di desktop, pilih catatan berikutnya jika masih ada sisa
                    if (notes.length > 0 && window.innerWidth >= 768) {
                        selectNote(notes[0].id);
                    } else {
                        // Kosongkan form editor jika tidak ada catatan tersisa
                        document.getElementById('editor-title').value = '';
                        document.getElementById('editor-content').value = '';
                        document.getElementById('editor-folder-name').innerText = 'Pilih Tag';
                    }
                });
            } else {
                if (confirm('Apakah Anda yakin ingin menghapus catatan ini?')) {
                    notes.splice(index, 1);
                    saveNotesToStorage();
                    showSuccessToast('Catatan berhasil dihapus!');

                    // Bersihkan state & tutup editor di ponsel
                    selectedNoteId = null;
                    closeNoteEditor();
                    renderNotesList();

                    // Di desktop, pilih catatan berikutnya jika masih ada sisa
                    if (notes.length > 0 && window.innerWidth >= 768) {
                        selectNote(notes[0].id);
                    } else {
                        // Kosongkan form editor jika tidak ada catatan tersisa
                        document.getElementById('editor-title').value = '';
                        document.getElementById('editor-content').value = '';
                        document.getElementById('editor-folder-name').innerText = 'Pilih Tag';
                    }
                }
            }
        }

        function handleSearch(val) {
            searchQuery = val;
            renderNotesList();
        }

        function closeNoteEditor() {
            const editorPanel = document.getElementById('notes-editor-panel');
            if (editorPanel) {
                editorPanel.classList.add('translate-y-full');
                setTimeout(() => {
                    editorPanel.classList.add('hidden');
                }, 300);
            }

            // Hilangkan fokus seleksi pada versi hp setelah ditutup
            if (window.innerWidth < 768) {
                selectedNoteId = null;
                renderNotesList();
            }
        }

        function autoExpandTextarea(element) {
            element.style.height = 'auto';
            element.style.height = element.scrollHeight + 'px';
        }

        function toggleProfileDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('profile-dropdown');
            if (!dropdown) return;

            dropdown.classList.toggle('opacity-0');
            dropdown.classList.toggle('invisible');
            dropdown.classList.toggle('scale-95');
            dropdown.classList.toggle('scale-100');
        }

        function toggleCategorySelectDropdown(event) {
            if (event) event.stopPropagation();
            const dropdown = document.getElementById('category-selector-dropdown');
            if (!dropdown) return;

            dropdown.classList.toggle('opacity-0');
            dropdown.classList.toggle('invisible');
        }

        function showSuccessToast(message) {
            createToast(message, 'success');
        }

        function showInfoToast(message) {
            createToast(message, 'info');
        }

        function createToast(message, type) {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = 'flex items-center p-3.5 bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 rounded-xl shadow-xl border border-zinc-800 dark:border-zinc-200 text-xs font-semibold space-x-2 transition-all duration-300 transform translate-y-2 opacity-0 pointer-events-auto';

            let icon = '';
            if (type === 'success') {
                icon = `<svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            } else {
                icon = `<svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            toast.innerHTML = `
        ${icon}
        <span>${message}</span>
      `;

            container.appendChild(toast);

            // Animate In
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);

            // Remove after 3 seconds
            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        // Simulasi logout halus
        function logoutSimulation() {
            showInfoToast('Anda berhasil keluar dari sistem Personal OS.');

            // Tutup dropdown setelah ditekan
            const dropdown = document.getElementById('profile-dropdown');
            if (dropdown) {
                dropdown.classList.add('opacity-0', 'invisible', 'scale-95');
                dropdown.classList.remove('scale-100');
            }
        }

        document.addEventListener('click', function (event) {
            // Tutup Dropdown Profil
            const profileDropdown = document.getElementById('profile-dropdown');
            const profileContainer = document.getElementById('profile-menu-container');
            if (profileDropdown && profileContainer && !profileContainer.contains(event.target)) {
                profileDropdown.classList.add('opacity-0', 'invisible', 'scale-95');
                profileDropdown.classList.remove('scale-100');
            }

            // Tutup Dropdown Pilihan Kategori di editor
            const catDropdown = document.getElementById('category-selector-dropdown');
            if (catDropdown && !event.target.closest('#category-selector-dropdown') && !event.target.closest('button[onclick="toggleCategorySelectDropdown(event)"]')) {
                catDropdown.classList.add('opacity-0', 'invisible');
            }
        });

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                showSuccessToast('Mode Terang diaktifkan');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                showSuccessToast('Mode Gelap diaktifkan');
            }
        }
    </script>

<script>
function triggerInstallPWA(e) {
    if(e) e.preventDefault();
    if (typeof window.showConfirmModal === 'function') {
        window.showConfirmModal('Ingin menginstal aplikasi Personal OS di perangkat Anda?', () => {
            if (typeof window.showToast === 'function') {
                window.showToast('Aplikasi sedang diinstal... (Simulasi PWA)', 'success');
            } else {
                alert('Aplikasi sedang diinstal... (Simulasi PWA)');
            }
            // Logic asli PWA jika berjalan di environment HTTPS / localhost yang valid:
            if (typeof window.deferredPrompt !== 'undefined' && window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then((choiceResult) => {
                    window.deferredPrompt = null;
                });
            }
        });
    } else if(confirm('Ingin menginstal aplikasi Personal OS di perangkat Anda?')) {
        alert('Aplikasi sedang diinstal... (Simulasi PWA)');
    }
}
</script>
